services:
  # ─── Database ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: contify-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-contify_root_2024}
      MYSQL_DATABASE: ${DB_DATABASE:-contify}
      MYSQL_USER: ${DB_USERNAME:-contify_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-contify_pass_2024}
    volumes:
      - contify_db_data:/var/lib/mysql
    networks:
      - contify-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-contify_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Backend (Laravel + Nginx + PHP-FPM) ─────────────────
  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: contify-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Contify
      APP_ENV: production
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: "false"
      APP_URL: http://${SERVER_IP:-203.175.10.112}:8000
      APP_TIMEZONE: Asia/Jakarta
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-contify}
      DB_USERNAME: ${DB_USERNAME:-contify_user}
      DB_PASSWORD: ${DB_PASSWORD:-contify_pass_2024}
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: public
    volumes:
      - contify_storage:/var/www/html/storage/app/public
      - contify_logs:/var/www/html/storage/logs
    ports:
      - "8000:8000"
    networks:
      - contify-net

  # ─── Frontend (Nginx Static) ──────────────────────────────
  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
    container_name: contify-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - contify-net

volumes:
  contify_db_data:
  contify_storage:
  contify_logs:

networks:
  contify-net:
    driver: bridge
